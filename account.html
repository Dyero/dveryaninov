<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Личный кабинет — Дверянинов</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script src="js/auth.js"></script>
  <script src="js/load-components.js"></script>
</head>
<body class="page page_account">
  
  <main class="account-page">
    <nav class="breadcrumbs" aria-label="Хлебные крошки">
      <a class="breadcrumbs__link" href="index.html">Главная</a>
      <span class="breadcrumbs__sep">–</span>
      <span class="breadcrumbs__current">История заказов</span>
    </nav>

    <h1 class="account-page__title" id="account-page-heading">История заказов</h1>

    <div class="account-layout">
      <!-- Боковое меню -->
      <aside class="account-aside">
        <div class="account-user-greeting">
          <p class="account-user-greeting__name">—</p>
          <p class="account-user-greeting__email">—</p>
        </div>
        <nav class="account-nav">
          <div class="account-nav__item account-nav__item_active" data-nav="orders">
            <a class="account-nav__link" href="#" data-panel="orders" aria-current="page">История заказов</a>
            <span class="account-nav__marker"></span>
          </div>
          <div class="account-nav__item" data-nav="profile">
            <a class="account-nav__link" href="#" data-panel="profile">Данные</a>
          </div>
          <div class="account-nav__item">
            <a class="account-nav__link" href="wishlist.html">Избранное</a>
          </div>
          <div class="account-nav__item">
            <a class="account-nav__link" href="cart.html">Корзина</a>
          </div>
          <div class="account-nav__item">
            <a class="account-nav__link" href="#" id="open-appeal-popup">Составить обращение</a>
          </div>
          <button type="button" class="account-nav__logout">Выйти</button>
        </nav>
      </aside>

      <!-- Правая колонка: панели контента -->
      <div class="account-content">

      <!-- Содержимое — динамический список заказов -->
      <section class="account-orders" id="panel-orders" aria-label="Список заказов">
        <!-- Заполняется через account.js -->
      </section>

      <!-- Вкладка: Личные данные -->
      <section class="account-profile-panel" id="panel-profile" aria-label="Личные данные" hidden>
        <h2 class="account-profile-panel__title">Личные данные</h2>
        <form class="account-profile-form" id="profile-form" novalidate>
          <div class="account-profile-form__group">
            <label class="account-profile-form__label" for="pf-name">Имя</label>
            <input class="account-profile-form__input" type="text" id="pf-name" name="name" autocomplete="name" required>
          </div>
          <div class="account-profile-form__group">
            <label class="account-profile-form__label" for="pf-email">Email</label>
            <input class="account-profile-form__input" type="email" id="pf-email" name="email" autocomplete="email" required>
          </div>
          <div class="account-profile-form__group">
            <label class="account-profile-form__label" for="pf-phone">Телефон</label>
            <input class="account-profile-form__input" type="tel" id="pf-phone" name="phone" autocomplete="tel" placeholder="+7 (___) ___-__-__">
          </div>
          <div class="account-profile-form__divider">
            <span class="account-profile-form__divider-label">Смена пароля</span>
          </div>
          <div class="account-profile-form__group">
            <label class="account-profile-form__label" for="pf-pass-current">Текущий пароль</label>
            <input class="account-profile-form__input" type="password" id="pf-pass-current" name="current-password" autocomplete="current-password">
          </div>
          <div class="account-profile-form__group">
            <label class="account-profile-form__label" for="pf-pass-new">Новый пароль</label>
            <input class="account-profile-form__input" type="password" id="pf-pass-new" name="new-password" autocomplete="new-password">
          </div>
          <div class="account-profile-form__group">
            <label class="account-profile-form__label" for="pf-pass-confirm">Повторите новый пароль</label>
            <input class="account-profile-form__input" type="password" id="pf-pass-confirm" name="confirm-password" autocomplete="new-password">
          </div>
          <div class="account-profile-form__error" aria-live="polite"></div>
          <div class="account-profile-form__success" aria-live="polite"></div>
          <button type="submit" class="account-profile-form__btn">Сохранить изменения</button>
        </form>
      </section>
      </div><!-- /.account-content -->
    </div>
  </main>

  <!-- Попап «Составить обращение» -->
  <div class="appeal-popup" id="appeal-popup" hidden>
    <div class="appeal-popup__overlay"></div>
    <div class="appeal-popup__window">
      <button class="appeal-popup__close" aria-label="Закрыть">&times;</button>
      <h2 class="appeal-popup__title">Составить обращение</h2>
      <form class="appeal-popup__form" id="appeal-form" novalidate>
        <div class="appeal-popup__group">
          <label class="appeal-popup__label" for="appeal-name">Имя</label>
          <input class="appeal-popup__input" type="text" id="appeal-name" name="name" required>
        </div>
        <div class="appeal-popup__group">
          <label class="appeal-popup__label" for="appeal-email">Email</label>
          <input class="appeal-popup__input" type="email" id="appeal-email" name="email" required>
        </div>
        <div class="appeal-popup__group">
          <label class="appeal-popup__label" for="appeal-subject">Тема обращения</label>
          <input class="appeal-popup__input" type="text" id="appeal-subject" name="subject" required>
        </div>
        <div class="appeal-popup__group">
          <label class="appeal-popup__label" for="appeal-message">Сообщение</label>
          <textarea class="appeal-popup__textarea" id="appeal-message" name="message" rows="5" required></textarea>
        </div>
        <button type="submit" class="appeal-popup__btn btn btn_primary">Отправить</button>
      </form>
    </div>
  </div>

  <nav class="mobile-menu" aria-label="Нижнее меню">
    <a class="mobile-menu__item" href="index.html">
      <span class="mobile-menu__icon" aria-hidden="true"></span>
      <span class="mobile-menu__label">Главная</span>
    </a>
    <a class="mobile-menu__item" href="catalog.html">
      <span class="mobile-menu__icon mobile-menu__icon_catalog" aria-hidden="true"></span>
      <span class="mobile-menu__label">Каталог</span>
    </a>
    <a class="mobile-menu__item" href="about.html">
      <span class="mobile-menu__icon mobile-menu__icon_about" aria-hidden="true"></span>
      <span class="mobile-menu__label">О компании</span>
    </a>
    <a class="mobile-menu__item" href="contacts.html">
      <span class="mobile-menu__icon mobile-menu__icon_contacts" aria-hidden="true"></span>
      <span class="mobile-menu__label">Контакты</span>
    </a>
    <a class="mobile-menu__item" href="cart.html">
      <span class="mobile-menu__icon mobile-menu__icon_cart" aria-hidden="true"></span>
      <span class="mobile-menu__label">Корзина</span>
    </a>
  </nav>

  <script src="js/account.js"></script>
  <script>
    (function() {
      const popup = document.getElementById("appeal-popup");
      const openBtn = document.getElementById("open-appeal-popup");
      const form = document.getElementById("appeal-form");
      if (!popup || !openBtn) return;

      function open() { popup.hidden = false; }
      function close() { popup.hidden = true; form.reset(); }

      openBtn.addEventListener("click", function(e) { e.preventDefault(); open(); });
      popup.querySelector(".appeal-popup__overlay").addEventListener("click", close);
      popup.querySelector(".appeal-popup__close").addEventListener("click", close);
      document.addEventListener("keydown", function(e) { if (e.key === "Escape" && !popup.hidden) close(); });

      form.addEventListener("submit", function(e) {
        e.preventDefault();
        alert("Обращение отправлено! Мы свяжемся с вами в ближайшее время.");
        close();
      });
    })();
  </script>
</body>
</html>
